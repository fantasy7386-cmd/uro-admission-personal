<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTUH Urology Admission Note Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#f5f5f7;color:#1d1d1f;height:100vh;display:flex;flex-direction:column;}
.top-bar{background:#fff;border-bottom:1px solid #d2d2d7;padding:12px 20px;flex-shrink:0;}
.top-bar h1{font-size:22px;font-weight:700;}
.top-bar .credit{font-size:11px;color:#86868b;margin-bottom:6px;}
.search-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.search-row label{font-size:15px;font-weight:600;}
.search-row input{flex:1;font-size:15px;padding:6px 12px;border:1px solid #d2d2d7;border-radius:6px;outline:none;}
.search-row input:focus{border-color:#0071e3;box-shadow:0 0 0 2px rgba(0,113,227,0.2);}
.kw-bar{display:flex;flex-wrap:wrap;gap:4px;}
.kw-btn{font-size:12px;padding:3px 10px;border:1px solid #d2d2d7;border-radius:12px;background:#fff;cursor:pointer;transition:all .15s;}
.kw-btn:hover{background:#0071e3;color:#fff;border-color:#0071e3;}
.main-area{display:flex;flex:1;overflow:hidden;padding:10px;gap:10px;}
.col-left{width:280px;min-width:220px;display:flex;flex-direction:column;background:#fff;border-radius:8px;border:1px solid #d2d2d7;overflow:hidden;flex-shrink:0;}
.col-right{flex:1;display:flex;flex-direction:column;background:#fff;border-radius:8px;border:1px solid #d2d2d7;overflow:hidden;}
.col-header{font-size:14px;font-weight:700;padding:10px 12px;border-bottom:1px solid #e5e5ea;background:#fafafa;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.col-header .btns{display:flex;gap:4px;}
.col-header .btn{font-size:11px;padding:3px 8px;border:1px solid #d2d2d7;border-radius:4px;background:#fff;cursor:pointer;}
.col-header .btn:hover{background:#0071e3;color:#fff;border-color:#0071e3;}
.col-body{flex:1;overflow-y:auto;}
.list-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px;transition:background .1s;}
.list-item:hover{background:#f0f0f5;}
.list-item.selected{background:#0071e3;color:#fff;}
.note-area{padding:16px 20px;font-size:13px;line-height:1.8;white-space:pre-wrap;font-family:'SF Mono','Consolas','Courier New',monospace;flex:1;overflow-y:auto;outline:none;}
.note-area:focus{box-shadow:inset 0 0 0 2px rgba(0,113,227,0.2);}
.toast{position:fixed;bottom:20px;right:20px;background:#1d1d1f;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:200;}
.toast.show{opacity:1;}
.tab-bar{display:flex;border-bottom:1px solid #e5e5ea;background:#fafafa;flex-shrink:0;flex-wrap:wrap;}
.tab{padding:8px 14px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{background:#f0f0f5;}
.tab.active{border-bottom-color:#0071e3;color:#0071e3;font-weight:600;}
</style>
</head>
<body>

<div class="top-bar">
  <h1>NTUH Urology Admission Note Generator</h1>
  <div class="credit">Developed by CY Wu</div>
  <div class="search-row">
    <label>Search:</label>
    <input type="text" id="searchInput" placeholder="Type procedure name (e.g. TURBT, TURP, hernia...)">
  </div>
  <div class="kw-bar" id="kwBar"></div>
</div>

<div class="main-area">
  <div class="col-left">
    <div class="col-header">Procedure</div>
    <div class="col-body" id="procList"></div>
  </div>
  <div class="col-right">
    <div class="col-header">
      <span id="sectionTitle">Admission Note</span>
      <div class="btns">
        <button class="btn" onclick="copyNote()">Copy</button>
        <button class="btn" onclick="resetNote()">Reset</button>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab active" data-tab="cc" onclick="switchTab('cc')">Chief Complaint</div>
      <div class="tab" data-tab="hx" onclick="switchTab('hx')">Brief History</div>
      <div class="tab" data-tab="dx" onclick="switchTab('dx')">Tentative Diagnosis</div>
      <div class="tab" data-tab="plan" onclick="switchTab('plan')">Medical Needs & Care Plan</div>
      <div class="tab" data-tab="pe" onclick="switchTab('pe')">Physical Exam</div>
      <div class="tab" data-tab="ros" onclick="switchTab('ros')">Review of Systems</div>
      <div class="tab" data-tab="lab" onclick="switchTab('lab')">Lab & Exam</div>
    </div>
    <div class="note-area" id="noteArea" contenteditable="true">
      <span style="color:#86868b;font-family:-apple-system,sans-serif;">Select a procedure on the left to generate an admission note.</span>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

for {preop_preparation}, with a {combined_procedure} planned on {op_date}.\n\nUpon admission, the patient reported well in status. No fever, fatigue, dyspnea, chest tightness, abdominal pain, nausea, vomiting, or dysuria was noted.", "active_problems": "#. {renal_tumor_description}\n#. {other_cancer_description}", "soap_s": "- {combined_indication}, admitted for combined surgery", "soap_o_extra": "[CT]: {ct_findings}\n[Colonoscopy]: {colonoscopy_findings}\n[Additional workup]: {additional_workup}", "soap_a": "- {renal_tumor_description}\n- {other_cancer_description}", "soap_p": "- Pre-operative assessment and preparation.\n- Arrange {combined_procedure} on {op_date}.\n- Consult {consulting_team} for combined surgery.\n- Post-operative care and adequate pain control.\n- Medication for underlying diseases as prescribed.", "treatment_goal": "- Admission without new onset of infection episodes.\n- Complete operation without major complications."}, {"procedure": "Chemotherapy (GC/GCarbo Regimen)", "keywords": ["chemotherapy", "GC", "GCarbo", "cisplatin", "gemcitabine", "carboplatin"], "chief_complaint": "{cancer_type}", "present_illness": "This is a {age}-year-old {gender} with underlying diseases of:\n{underlying_diseases}\n\nThe patient was diagnosed with {cancer_history}. {treatment_history}. {current_status}.\n\nThe patient was admitted for {regimen} chemotherapy {cycle} as per oncologist's prescription.\n\nUpon admission, the patient reported well in status. No fever, fatigue, dyspnea, chest tightness, abdominal pain, nausea, vomiting, or dysuria was noted. ECOG performance status: {ecog_score}.", "active_problems": "#. {cancer_type}, {staging}", "soap_s": "- {cancer_type}, admitted for {regimen} chemotherapy {cycle}", "soap_o_extra": "[ECOG]: {ecog_score}\n[Latest labs]: {lab_summary}", "soap_a": "- {cancer_type}, {staging}", "soap_p": "- Conduct pre-chemotherapy assessment and preparation.\n- Collect lab data for pre-chemotherapy evaluation.\n- Administer {regimen} per oncologist's prescription.\n- Monitor vitals and observe for any adverse events.\n- Ensure adequate hydration and provide antiemetics as needed.", "treatment_goal": "- Complete chemotherapy and keep side effects < grade II.\n- Admission without new onset of infection episodes."}, {"procedure": "Immunotherapy", "keywords": ["immunotherapy", "pembrolizumab", "atezolizumab", "nivolumab", "avelumab", "IO", "checkpoint inhibitor"], "chief_complaint": "{cancer_type}", "present_illness": "This is a {age}-year-old {gender} with underlying diseases of:\n{underlying_diseases}\n\nThe patient was diagnosed with {cancer_history}. {treatment_history}. After discussion with the oncology team, immunotherapy with {agent} was recommended. {current_status}.\n\nThe patient was admitted for {agent} {cycle} as per oncologist's prescription.\n\nUpon admission, the patient reported well in status. No fever, fatigue, dyspnea, chest tightness, abdominal pain, nausea, vomiting, or dysuria was noted. ECOG performance status: {ecog_score}.", "active_problems": "#. {cancer_type}, {staging}", "soap_s": "- {cancer_type}, admitted for immunotherapy {cycle}", "soap_o_extra": "[ECOG]: {ecog_score}\n[Latest labs]: {lab_summary}", "soap_a": "- {cancer_type}, {staging}", "soap_p": "- Conduct pre-immunotherapy assessment and preparation.\n- Administer {agent} per oncologist's prescription.\n- Monitor vitals and observe for immune-related adverse events (irAEs).\n- Monitor thyroid function, liver function, and blood glucose.\n- Collect lab data for pre-treatment evaluation.", "treatment_goal": "- Complete immunotherapy cycle without irAEs > grade II.\n- Admission without new onset of infection episodes."}, {"procedure": "General Procedure (Customizable)", "keywords": ["general", "other", "custom", "miscellaneous"], "chief_complaint": "{chief_complaint}", "present_illness": "This is a {age}-year-old {gender} with underlying diseases of:\n{underlying_diseases}\n\n{present_illness_details}\n\nAfter thorough discussion regarding the current condition and treatment options, the patient agreed to undergo {procedure_name} on {op_date}. Under the impression of {impression}, the patient was admitted for further evaluation and management.\n\nUpon admission, the patient reported well in status. No fever, fatigue, dyspnea, chest tightness, abdominal pain, nausea, vomiting, or dysuria was noted.", "active_problems": "#. {impression}", "soap_s": "- {chief_complaint}", "soap_o_extra": "", "soap_a": "- {impression}", "soap_p": "- Pre-operative assessment and preparation.\n- Arrange {procedure_name} on {op_date}.\n- Post-operative care and adequate pain control.\n- Medication for underlying diseases as prescribed.", "treatment_goal": "- Admission without new onset of infection episodes.\n- Complete operation without major complications.\n- Post-op body temperature <37.5°C, pain score <3."}];

const STANDARD_PE = `[Physical Examination]
Height: ____ cm, Weight: ____ kg

1. Consciousness: Clear and oriented

   Breathing sounds: Bilateral clear, wheezing (-)

const TAB_NAMES = {
  cc: "Chief Complaint",
  hx: "Brief History",
  dx: "Tentative Diagnosis",
  plan: "Medical Needs & Care Plan",
  pe: "Physical Exam",
  ros: "Review of Systems",
  lab: "Lab & Exam"
};

let filtered = KB;
let currentProc = null;
let currentTab = 'cc';

const KEYWORDS = ["TURBT","TURP","TUEP","RIRS","URS","TRUSP","MR fusion","RaLRP",
  "hernia","orchiopexy","DBJ","stent","cystoscopy","pyeloplasty","biopsy",
  "varicocelectomy","adrenalectomy","chemotherapy"];

function init() {
  const kwBar = document.getElementById("kwBar");
  KEYWORDS.forEach(kw => {
    const b = document.createElement("button");
    b.className = "kw-btn"; b.textContent = kw;
    b.onclick = () => { document.getElementById("searchInput").value = kw; onSearch(); };
    kwBar.appendChild(b);
  });
  document.getElementById("searchInput").addEventListener("input", onSearch);
  renderProcs();
}

function onSearch() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!q) { filtered = KB; } else {
    const t = q.split(/\s+/);
    filtered = KB.filter(p => {
      const s = (p.procedure + " " + p.keywords.join(" ")).toLowerCase();
      return t.every(tk => s.includes(tk));
    });
  }
  currentProc = null;
  renderProcs();
  renderNote();
}

function renderProcs() {
  const el = document.getElementById("procList"); el.innerHTML = "";
  filtered.forEach((p, i) => {
    const d = document.createElement("div");
    d.className = "list-item" + (currentProc === p ? " selected" : "");
    d.textContent = p.procedure;
    d.onclick = () => selectProc(i);
    el.appendChild(d);
  });
}

function selectProc(i) {
  currentProc = filtered[i];
  renderProcs();
  renderNote();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById("sectionTitle").textContent = TAB_NAMES[tab] || "Admission Note";
  renderNote();
}

function renderNote() {
  const el = document.getElementById("noteArea");
  if (!currentProc) {
    el.innerHTML = '<span style="color:#86868b;font-family:-apple-system,sans-serif;">Select a procedure on the left to generate an admission note.</span>';
    return;
  }
  const p = currentProc;

  switch (currentTab) {
    case 'cc':
      el.textContent = p.chief_complaint + ", admitted for " + p.procedure;
      break;

    case 'hx':
      el.textContent = p.present_illness;
      break;

    case 'dx':
      el.textContent = p.active_problems;
      break;

    case 'plan':
      el.textContent =
`# {age} y/o {M/F} with ${p.soap_a.replace(/^- /, '')}, admitted for ${p.procedure}

S:
${p.soap_s}

Upon admission, the patient reported well in status. No fever, fatigue, dyspnea, chest tightness, abdominal pain, nausea, vomiting, or dysuria was noted.

O:
[Vital signs]:
- Afebrile, no tachycardia or dyspnea
- Stable blood pressure

[Physical exam]:
- Bilateral clear breathing sounds
- Soft abdomen without tenderness
- No wound over four extremities
${p.soap_o_extra ? '\n' + p.soap_o_extra : ''}

[Lab data]:
- CBC: Within normal limits
- Fair liver and renal function
- Normal coagulation function
- U/A: {ua_findings}

A:
${p.soap_a}

P:
${p.soap_p}

Treatment Goal:
${p.treatment_goal}`;
      break;

    case 'pe':
      el.textContent = STANDARD_PE;
      break;

    case 'ros':
      el.textContent = STANDARD_ROS;
      break;

    case 'lab':
      el.textContent = STANDARD_LAB;
      break;
  }
}

function resetNote() { renderNote(); }

function copyNote() {
  const t = document.getElementById("noteArea").textContent;
  if (!t || t.startsWith("Select")) return;
  navigator.clipboard.writeText(t).then(() => {
    const toast = document.getElementById("toast");
    toast.textContent = TAB_NAMES[currentTab] + " copied!";
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1500);
  });
}

init();
</script>
